name: dev ARM64 build

on:
  push:
    branches:
      - main
      - master

jobs:
  build-push:
    strategy:
      matrix:
        include:
          - target: controller
            dockerfile: package/Dockerfile.controller
            platforms: linux/arm64
          - target: enforcer
            dockerfile: package/Dockerfile.enforcer
            platforms: linux/arm64
    runs-on: ubuntu-latest
    env:
      BUILD_KEY: ${{ secrets.BUILD_KEY }}
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Patch source code
        if: env.BUILD_KEY != ''
        run: 'echo "$BUILD_KEY" | base64 -d > share/utils/keys.go'
      - name: Create builder
        run: make buildx-machine
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          file: ${{ matrix.dockerfile }}
          tags: ${{ secrets.DEV_BUILD_REPOSITORY }}/${{ matrix.target }}:latest-arm64
          platforms: ${{ matrix.platforms }}
          build-args: |
            COMMIT=${{ github.sha }}
            VERSION=${{ github.ref_name }}

